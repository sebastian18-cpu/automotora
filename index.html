<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Automotora de autos usados</title>
  <style>
    /* --- CSS --- */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }
    header {
      background-color: #1a1a1a;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }
    nav {
      background-color: #333;
      display: flex;
      justify-content: center;
      padding: 10px 0;
    }
    nav button {
      background: none;
      border: none;
      color: #fff;
      margin: 0 15px;
      font-weight: bold;
      cursor: pointer;
      transition: color 0.3s ease;
    }
    nav button:hover {
      color: #ffcc00;
    }
    .cars-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 40px;
    }
    .car-card {
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.3s ease;
    }
    .car-card:hover {
      transform: translateY(-5px);
    }
    .car-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .car-card h3 {
      margin: 15px;
      font-size: 1.2rem;
    }
    .car-card p {
      margin: 0 15px 15px;
      color: #666;
    }
    .btn {
      display: inline-block;
      margin: 15px;
      padding: 10px 20px;
      background-color: #ffcc00;
      color: #333;
      font-weight: bold;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    .btn:hover {
      background-color: #e6b800;
    }
    footer {
      background-color: #1a1a1a;
      color: #fff;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Automotora Premium</h1>
  </header>

  <nav>
    <button onclick="filtrarPorMarca('Toyota')">Toyota</button>
    <button onclick="filtrarPorMarca('Ford')">Ford</button>
    <button onclick="filtrarPorPrecio(20000)">Menos de $20.000</button>
    <button onclick="mostrarTodos()">Todos</button>
  </nav>

  <section id="cars-section" class="cars-section"></section>

  <footer>
    <p>© 2026 Automotora Premium - Todos los derechos reservados</p>
  </footer>

  <script>
    // --- JavaScript ---
    const autos = [
      { marca: "Toyota", modelo: "Corolla", precio: 18000, imagen: "https://via.placeholder.com/400x200?text=Toyota+Corolla" },
      { marca: "Ford", modelo: "Focus", precio: 22000, imagen: "https://via.placeholder.com/400x200?text=Ford+Focus" },
      { marca: "Toyota", modelo: "Hilux", precio: 35000, imagen: "https://via.placeholder.com/400x200?text=Toyota+Hilux" },
      { marca: "Ford", modelo: "Mustang", precio: 55000, imagen: "https://via.placeholder.com/400x200?text=Ford+Mustang" }
    ];

    const carsSection = document.getElementById("cars-section");

    function mostrarAutos(lista) {
      carsSection.innerHTML = "";
      lista.forEach(auto => {
        const card = document.createElement("div");
        card.className = "car-card";
        card.innerHTML = `
          <img src="${auto.imagen}" alt="${auto.modelo}">
          <h3>${auto.marca} ${auto.modelo}</h3>
          <p>Precio: $${auto.precio}</p>
          <a href="#" class="btn">Cotizar</a>
        `;
        carsSection.appendChild(card);
      });
    }

    function filtrarPorMarca(marca) {
      const filtrados = autos.filter(auto => auto.marca === marca);
      mostrarAutos(filtrados);
    }

    function filtrarPorPrecio(maxPrecio) {
      const filtrados = autos.filter(auto => auto.precio <= maxPrecio);
      mostrarAutos(filtrados);
    }

    function mostrarTodos() {
      mostrarAutos(autos);
    }

    // Inicialización
    mostrarTodos();
  </script>
</body>
</html>
